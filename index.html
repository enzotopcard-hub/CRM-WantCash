<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlackBall — Manager Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222222;
    --accent: #c8f135;
    --accent2: #ff4d4d;
    --accent3: #4d9fff;
    --text: #f0f0f0;
    --muted: #555;
    --muted2: #888;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* LOGIN */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: var(--bg);
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 40px;
    width: 420px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .login-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--accent);
    margin-bottom: 8px;
  }
  .login-sub {
    font-size: 12px;
    color: var(--muted2);
    margin-top: -16px;
    margin-bottom: 8px;
  }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--muted2);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent); }
  .btn-primary {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius);
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    width: 100%;
    letter-spacing: 0.5px;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .error-msg {
    font-size: 12px;
    color: var(--accent2);
    display: none;
    padding: 10px 14px;
    background: rgba(255,77,77,0.08);
    border-radius: 8px;
    border: 1px solid rgba(255,77,77,0.2);
  }

  /* MAIN LAYOUT */
  #app { display: none; flex-direction: column; height: 100vh; }

  /* TOP BAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    height: 56px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .topbar-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 16px;
    color: var(--accent);
    letter-spacing: -0.3px;
  }
  .topbar-info {
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 12px;
    color: var(--muted2);
  }
  .manager-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--accent);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    margin-right: 6px;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* BODY */
  .main-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    width: 300px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-title {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--text);
  }
  .badge-count {
    background: var(--accent);
    color: #000;
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 700;
  }
  .btn-refresh {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted2);
    font-size: 14px;
    cursor: pointer;
    padding: 4px 8px;
    transition: all 0.2s;
  }
  .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }
  .conv-list { flex: 1; overflow-y: auto; }
  .conv-item {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .conv-item:hover { background: var(--surface2); }
  .conv-item.active { background: rgba(200,241,53,0.06); border-left: 3px solid var(--accent); }
  .conv-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .conv-info { flex: 1; min-width: 0; }
  .conv-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .conv-preview {
    font-size: 11px;
    color: var(--muted2);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-top: 2px;
  }
  .conv-time { font-size: 10px; color: var(--muted); flex-shrink: 0; }
  .conv-unread {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }
  .empty-state {
    padding: 40px 20px;
    text-align: center;
    color: var(--muted2);
    font-size: 12px;
    line-height: 1.8;
  }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }

  /* ADD CONV */
  .sidebar-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
  }
  .sidebar-footer input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    outline: none;
  }
  .sidebar-footer input:focus { border-color: var(--accent); }
  .btn-add {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 16px;
    cursor: pointer;
    font-weight: 700;
    transition: opacity 0.2s;
  }
  .btn-add:hover { opacity: 0.8; }

  /* CHAT AREA */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .chat-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted2);
    font-size: 13px;
    gap: 12px;
  }
  .chat-empty-icon { font-size: 48px; opacity: 0.3; }

  /* CHAT HEADER */
  .chat-header {
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    flex-shrink: 0;
  }
  .chat-header-info { display: flex; align-items: center; gap: 12px; }
  .chat-number {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
  }
  .chat-status { font-size: 11px; color: var(--muted2); }
  .chat-actions { display: flex; gap: 8px; }
  .btn-action {
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.2s;
  }
  .btn-return {
    background: none;
    color: var(--muted2);
  }
  .btn-return:hover { border-color: var(--accent3); color: var(--accent3); }

  /* MESSAGES */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--bg);
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; flex-direction: column; max-width: 72%; }
  .msg.client { align-self: flex-start; }
  .msg.manager { align-self: flex-end; }
  .msg-bubble {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg.client .msg-bubble {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .msg.manager .msg-bubble {
    background: rgba(200,241,53,0.12);
    border: 1px solid rgba(200,241,53,0.25);
    color: var(--text);
    border-bottom-right-radius: 4px;
  }
  .msg-meta {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    padding: 0 2px;
  }
  .msg.manager .msg-meta { text-align: right; }

  /* INPUT */
  .chat-input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  .chat-input-area textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  .chat-input-area textarea:focus { border-color: var(--accent); }
  .btn-send {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    width: 44px; height: 44px;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  .btn-send:hover { opacity: 0.85; transform: scale(1.05); }
  .btn-send:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    font-size: 13px;
    color: var(--text);
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 999;
    max-width: 320px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(200,241,53,0.4); color: var(--accent); }
  .toast.error { border-color: rgba(255,77,77,0.4); color: var(--accent2); }

  .loading-spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid var(--muted);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .scrollbar-custom::-webkit-scrollbar { width: 4px; }
  .scrollbar-custom::-webkit-scrollbar-track { background: transparent; }
  .scrollbar-custom::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .conv-list { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">⚫ BlackBall Support</div>
    <p class="login-sub">Manager Panel — Acesso Interno</p>
    <div class="field">
      <label>Seu nome</label>
      <input type="text" id="input-name" placeholder="Ex: João Silva" />
    </div>
    <div class="field">
      <label>URL base do n8n</label>
      <input type="text" id="input-url" placeholder="https://SEU-NOME.app.n8n.cloud" />
    </div>
    <div class="field">
      <label>Phone Number ID (Meta)</label>
      <input type="text" id="input-phone-id" placeholder="123456789012345" />
    </div>
    <div class="error-msg" id="login-error">Preencha todos os campos.</div>
    <button class="btn-primary" onclick="doLogin()">Entrar no Painel →</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">⚫ BlackBall Support</div>
    <div class="topbar-info">
      <span><span class="status-dot"></span>Online</span>
      <span class="manager-badge" id="manager-label">Manager</span>
      <button class="btn-refresh" onclick="loadConversations()" title="Atualizar">↻</button>
      <button class="btn-refresh" onclick="logout()" title="Sair" style="color:var(--accent2)">✕</button>
    </div>
  </div>

  <div class="main-body">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Conversas Pendentes</span>
        <span class="badge-count" id="conv-count">0</span>
      </div>
      <div class="conv-list" id="conv-list">
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          Nenhuma conversa aguardando.<br>O bot está atendendo normalmente.
        </div>
      </div>
      <div class="sidebar-footer">
        <input type="text" id="new-number" placeholder="5511999999999" />
        <button class="btn-add" onclick="openNewConv()" title="Abrir nova conversa">+</button>
      </div>
    </div>

    <!-- CHAT -->
    <div class="chat-area" id="chat-area">
      <div class="chat-empty">
        <div class="chat-empty-icon">💬</div>
        <span>Selecione uma conversa para atender</span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let N8N_URL = '';
let PHONE_ID = '';
let MANAGER_NAME = '';
let activeNumber = null;
let conversations = {};
let refreshTimer = null;

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function doLogin() {
  const name = document.getElementById('input-name').value.trim();
  let url = document.getElementById('input-url').value.trim().replace(/\/$/, '');
  const phoneId = document.getElementById('input-phone-id').value.trim();
  const err = document.getElementById('login-error');

  if (!name || !url || !phoneId) {
    err.style.display = 'block';
    err.textContent = 'Preencha todos os campos.';
    return;
  }
  if (!url.startsWith('http')) url = 'https://' + url;

  MANAGER_NAME = name;
  N8N_URL = url;
  PHONE_ID = phoneId;

  err.style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('manager-label').textContent = name;

  loadConversations();
  refreshTimer = setInterval(loadConversations, 10000);
}

function logout() {
  clearInterval(refreshTimer);
  N8N_URL = ''; PHONE_ID = ''; MANAGER_NAME = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

// ─── LOAD CONVERSATIONS ───────────────────────────────────────────────────────
async function loadConversations() {
  try {
    const res = await fetch(`${N8N_URL}/webhook/whatsapp-historico`, {
      method: 'GET',
      headers: { 'Content-Type': 'application/json' }
    });
    const data = await res.json();
    renderSidebar(data);
    if (activeNumber) loadHistory(activeNumber);
  } catch (e) {
    showToast('Erro ao carregar conversas: ' + e.message, 'error');
  }
}

async function loadHistory(number) {
  try {
    const res = await fetch(`${N8N_URL}/webhook/whatsapp-historico?numero=${number}`, {
      method: 'GET',
      headers: { 'Content-Type': 'application/json' }
    });
    const data = await res.json();
    if (data && data.mensagens) {
      conversations[number] = data.mensagens;
      renderMessages(number);
    }
  } catch (e) {}
}

// ─── RENDER SIDEBAR ───────────────────────────────────────────────────────────
function renderSidebar(data) {
  const list = document.getElementById('conv-list');
  const badge = document.getElementById('conv-count');

  // data pode ser array de {numero, ultimaMensagem, timestamp} ou objeto
  let convs = [];
  if (Array.isArray(data)) convs = data;
  else if (data && data.conversas) convs = data.conversas;
  else if (data && data.numero) convs = [data];

  badge.textContent = convs.length;

  if (convs.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div>Nenhuma conversa aguardando.<br>O bot está atendendo normalmente.</div>`;
    return;
  }

  list.innerHTML = convs.map(c => {
    const num = c.numero || c.from || '';
    const preview = c.ultimaMensagem || c.lastMessage || '...';
    const time = c.timestamp ? new Date(c.timestamp).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'}) : '';
    const isActive = num === activeNumber;
    return `<div class="conv-item ${isActive ? 'active' : ''}" onclick="selectConv('${num}')">
      <div class="conv-avatar">👤</div>
      <div class="conv-info">
        <div class="conv-name">${formatNumber(num)}</div>
        <div class="conv-preview">${escHtml(preview.substring(0,40))}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div class="conv-time">${time}</div>
        ${!isActive ? '<div class="conv-unread"></div>' : ''}
      </div>
    </div>`;
  }).join('');
}

// ─── SELECT CONVERSATION ──────────────────────────────────────────────────────
async function selectConv(number) {
  activeNumber = number;
  renderChatHeader(number);
  await loadHistory(number);
  // Refresh sidebar to update active state
  loadConversations();
}

function openNewConv() {
  const n = document.getElementById('new-number').value.trim().replace(/\D/g,'');
  if (!n) return;
  activeNumber = n;
  conversations[n] = conversations[n] || [];
  renderChatHeader(n);
  renderMessages(n);
  document.getElementById('new-number').value = '';
}

// ─── RENDER CHAT ──────────────────────────────────────────────────────────────
function renderChatHeader(number) {
  const chatArea = document.getElementById('chat-area');
  chatArea.innerHTML = `
    <div class="chat-header">
      <div class="chat-header-info">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px">👤</div>
        <div>
          <div class="chat-number">${formatNumber(number)}</div>
          <div class="chat-status">🟡 Aguardando atendimento humano</div>
        </div>
      </div>
      <div class="chat-actions">
        <button class="btn-action btn-return" onclick="returnToBot('${number}')">↩ Devolver ao Bot</button>
      </div>
    </div>
    <div class="messages" id="messages-${number}"></div>
    <div class="chat-input-area">
      <textarea id="input-msg-${number}" placeholder="Digite sua resposta..." rows="1"
        onkeydown="handleKey(event,'${number}')"
        oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="btn-send-${number}" onclick="sendMessage('${number}')">➤</button>
    </div>
  `;
  renderMessages(number);
  setTimeout(() => document.getElementById(`input-msg-${number}`)?.focus(), 100);
}

function renderMessages(number) {
  const container = document.getElementById(`messages-${number}`);
  if (!container) return;
  const msgs = conversations[number] || [];
  if (msgs.length === 0) {
    container.innerHTML = `<div style="text-align:center;color:var(--muted);font-size:12px;padding:24px">Sem mensagens ainda.</div>`;
    return;
  }
  container.innerHTML = msgs.map(m => {
    const isManager = m.tipo === 'manager' || m.role === 'manager' || m.from === 'manager';
    const time = m.timestamp ? new Date(m.timestamp).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}) : '';
    const byName = isManager ? (m.manager || MANAGER_NAME) : '';
    return `<div class="msg ${isManager ? 'manager' : 'client'}">
      <div class="msg-bubble">${escHtml(m.mensagem || m.message || m.body || '')}</div>
      <div class="msg-meta">${isManager ? `✓ ${byName} · ` : ''}${time}</div>
    </div>`;
  }).join('');
  container.scrollTop = container.scrollHeight;
}

// ─── SEND MESSAGE ─────────────────────────────────────────────────────────────
async function sendMessage(number) {
  const input = document.getElementById(`input-msg-${number}`);
  const btn = document.getElementById(`btn-send-${number}`);
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;
  btn.innerHTML = '<span class="loading-spinner"></span>';

  try {
    const res = await fetch(`${N8N_URL}/webhook/whatsapp-responder`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        para: number,
        mensagem: text,
        manager: MANAGER_NAME,
        phoneNumberId: PHONE_ID
      })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    // Add to local history immediately
    if (!conversations[number]) conversations[number] = [];
    conversations[number].push({
      tipo: 'manager',
      mensagem: text,
      manager: MANAGER_NAME,
      timestamp: Date.now()
    });
    renderMessages(number);
    showToast('Mensagem enviada ✓', 'success');
  } catch (e) {
    showToast('Erro ao enviar: ' + e.message, 'error');
    input.value = text;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '➤';
  }
}

// ─── RETURN TO BOT ────────────────────────────────────────────────────────────
async function returnToBot(number) {
  if (!confirm(`Devolver ${formatNumber(number)} ao bot?`)) return;
  try {
    await fetch(`${N8N_URL}/webhook/whatsapp-handoff`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ numero: number, modo: 'bot', manager: MANAGER_NAME })
    });
    showToast('Conversa devolvida ao bot ✓', 'success');
    activeNumber = null;
    document.getElementById('chat-area').innerHTML = `
      <div class="chat-empty">
        <div class="chat-empty-icon">💬</div>
        <span>Selecione uma conversa para atender</span>
      </div>`;
    loadConversations();
  } catch (e) {
    showToast('Erro: ' + e.message, 'error');
  }
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function handleKey(e, number) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(number); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function formatNumber(n) {
  if (!n) return '';
  n = String(n);
  if (n.length === 13) return `+${n.slice(0,2)} (${n.slice(2,4)}) ${n.slice(4,9)}-${n.slice(9)}`;
  return `+${n}`;
}

function escHtml(t) {
  if (!t) return '';
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 3000);
}
</script>
